version: '3.8'

services:
  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: easy-al-obour-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - easy-al-obour-network

  # Node.js application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: easy-al-obour-app
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-secure-random-string}
      - OAUTH_SERVER_URL=${OAUTH_SERVER_URL:-}
      - VITE_APP_ID=${VITE_APP_ID:-}
      - OWNER_OPEN_ID=${OWNER_OPEN_ID:-}
      - DATABASE_URL=${DATABASE_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - easy-al-obour-network
    depends_on:
      - db
    volumes:
      - ./dist:/app/dist

  # MySQL database (optional)
  db:
    image: mysql:8.0
    container_name: easy-al-obour-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-easy_al_obour}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-app_password}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - easy-al-obour-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    driver: local

networks:
  easy-al-obour-network:
    driver: bridge
